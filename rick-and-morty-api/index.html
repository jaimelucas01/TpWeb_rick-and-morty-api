<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rick and Morty API</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h1>Rick and Morty API</h1>

    <button id="btnTodos">
        Obtener todos los personajes
    </button>

    <div class="filtros">

        <input
            type="text"
            id="name"
            placeholder="Nombre">

        <input
            type="text"
            id="status"
            placeholder="Estado">

        <input
            type="text"
            id="species"
            placeholder="Especie">

        <input
            type="text"
            id="type"
            placeholder="Tipo">

        <input
            type="text"
            id="gender"
            placeholder="Género">

        <button id="btnBuscar">
            Buscar con filtros
        </button>

    </div>

    <div id="resultado"></div>

    <script src="script.js"></script>

</body>

</html>
